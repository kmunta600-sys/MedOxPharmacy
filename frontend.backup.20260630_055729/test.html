<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Medox Pharmacy - Test</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A1628; color: white; }
        .page { display: none; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 1; }
        .page.active { display: flex; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Simple Landing */
        #landing { background: #0A1628; }
        #landing .btn { padding: 14px 32px; border: none; border-radius: 12px; background: #D69E2E; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        #landing .btn:hover { background: #ECC94B; }
        #landing h1 { font-size: 48px; margin-bottom: 10px; }
        #landing h1 span { color: #D69E2E; }
        
        /* Simple Login */
        #login { background: #0D1A2D; }
        #login .login-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 40px; max-width: 400px; width: 100%; }
        #login .login-card h2 { text-align: center; margin-bottom: 20px; }
        #login .login-card h2 span { color: #D69E2E; }
        #login .login-card input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(255,255,255,0.03); color: white; }
        #login .login-card .btn-login { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #D69E2E, #ECC94B); color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
        #login .login-card .btn-login:hover { transform: translateY(-2px); }
        #login .back-btn { background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; margin-bottom: 16px; }
        #login .back-btn:hover { color: #D69E2E; }
    </style>
</head>
<body>

    <!-- ============================================================
    PAGE: LANDING
    ============================================================ -->
    <div class="page active" id="landing">
        <h1>Medox <span>Pharmacy</span></h1>
        <p style="color:rgba(255,255,255,0.5);margin-bottom:24px;">Inventory Management System</p>
        <button class="btn" onclick="showPage('login')">🔓 Login</button>
    </div>

    <!-- ============================================================
    PAGE: LOGIN
    ============================================================ -->
    <div class="page" id="login">
        <div class="login-card">
            <button class="back-btn" onclick="showPage('landing')">← Back</button>
            <h2>Medox<span>Pharmacy</span></h2>
            <p style="text-align:center;color:rgba(255,255,255,0.25);margin-bottom:24px;">Sign in to your account</p>
            
            <div style="margin-bottom:12px;">
                <input type="email" id="loginEmail" placeholder="Email Address" value="demo@medox.com" />
            </div>
            <div style="margin-bottom:12px;">
                <input type="password" id="loginPassword" placeholder="Password" value="password123" />
            </div>
            
            <button class="btn-login" onclick="handleLogin()">🔓 Sign In</button>
            
            <div style="margin-top:16px;padding:10px;background:rgba(255,255,255,0.02);border-radius:12px;text-align:center;">
                <div style="font-size:10px;color:rgba(255,255,255,0.15);text-transform:uppercase;letter-spacing:1.5px;">🔐 Demo Credentials</div>
                <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,0.3);">
                    <span><i class="fas fa-envelope" style="color:#D69E2E;"></i> <code style="color:#D69E2E;background:rgba(214,158,46,0.06);padding:1px 8px;border-radius:4px;">demo@medox.com</code></span>
                    <span style="color:rgba(255,255,255,0.06);">|</span>
                    <span><i class="fas fa-key" style="color:#D69E2E;"></i> <code style="color:#D69E2E;background:rgba(214,158,46,0.06);padding:1px 8px;border-radius:4px;">password123</code></span>
                </div>
            </div>
            
            <div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04);text-align:center;">
                <div style="font-size:10px;color:rgba(255,255,255,0.08);">&copy; 2026 Medox Pharmacy. All rights reserved.</div>
            </div>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // PAGE NAVIGATION
        // ============================================================
        function showPage(pageId) {
            console.log('🔍 Showing page:', pageId);
            
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });
            
            // Show selected page
            const target = document.getElementById(pageId);
            if (target) {
                target.classList.add('active');
                console.log('✅ Page shown:', pageId);
            } else {
                console.log('❌ Page not found:', pageId);
            }
        }

        // ============================================================
        // LOGIN
        // ============================================================
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            console.log('📧 Email:', email);
            console.log('🔑 Password:', password);

            if (email === 'demo@medox.com' && password === 'password123') {
                alert('✅ Login Successful!\n\nWelcome to Medox Pharmacy Inventory System.');
                // For now, just show the dashboard (we'll build it later)
                document.getElementById('login').classList.remove('active');
                document.getElementById('landing').classList.add('active');
                alert('📊 Dashboard coming soon!');
            } else {
                alert('❌ Invalid email or password. Please try again.');
            }
        }

        console.log('💊 Medox Pharmacy Test App');
        console.log('🔐 Demo: demo@medox.com / password123');
        console.log('📌 Click "Login" to test');
    </script>

</body>
</html>
