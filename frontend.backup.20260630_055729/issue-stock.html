<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Issue Stock - MedOx Pharmacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D69E2E;
            --gold-light: #ECC94B;
            --dark: #0A0F1E;
            --white: #FFFFFF;
            --text-muted: rgba(255,255,255,0.4);
            --font: 'Inter', sans-serif;
        }
        body { font-family: var(--font); background: var(--dark); color: var(--white); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 14px; padding: 24px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: var(--text-muted); }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin: 16px 0; }
        .grid-2 { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 8px; }
        input, select { width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; color: var(--white); font-family: var(--font); }
        .btn-gold { padding: 10px 20px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--white); border: none; border-radius: 8px; cursor: pointer; }
        .btn-secondary { padding: 10px 20px; background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; cursor: pointer; }
        .back-btn { color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .back-btn:hover { color: var(--white); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <div class="card">
            <h1>Issue Stock</h1>
            <p>Dispense items to patients or wards</p>
            
            <div class="grid">
                <div>
                    <label>Issue To</label>
                    <select id="issueTo"><option>Ward 1</option><option>Ward 2</option><option>Customer</option></select>
                </div>
                <div>
                    <label>Patient Name</label>
                    <input type="text" placeholder="John Doe" />
                </div>
                <div>
                    <label>Reference</label>
                    <input type="text" placeholder="RX-2026-001" />
                </div>
                <div>
                    <label>Issued By</label>
                    <input type="text" value="Pharmacist" readonly />
                </div>
            </div>
            
            <div style="display:flex;justify-content:space-between;margin:12px 0;">
                <span>Items to Issue</span>
                <button onclick="alert('Add row')" style="color:var(--gold);background:none;border:1px solid rgba(214,158,46,0.1);padding:4px 14px;border-radius:6px;cursor:pointer;">+ Add Item</button>
            </div>
            
            <div style="background:rgba(255,255,255,0.02);padding:8px;border-radius:6px;margin-bottom:8px;">
                <div class="grid-2" style="font-size:11px;color:var(--text-muted);">
                    <span>Product</span><span>Qty</span><span>Stock</span><span></span>
                </div>
                <div class="grid-2" style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);">
                    <input type="text" placeholder="Search product..." style="padding:4px 8px;font-size:12px;" />
                    <input type="number" placeholder="0" style="padding:4px 8px;font-size:12px;" />
                    <span style="font-size:12px;color:var(--text-muted);">0</span>
                    <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;">×</button>
                </div>
            </div>
            
            <div style="display:flex;gap:12px;margin-top:16px;">
                <button class="btn-gold" onclick="alert('Issuing items...')"><i class="fas fa-arrow-up"></i> Issue All Items</button>
                <button class="btn-secondary">Clear All</button>
            </div>
        </div>
    </div>
</body>
</html>
